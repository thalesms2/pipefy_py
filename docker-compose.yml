services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Fallback: DATABASE_URL=postgresql+asyncpg://mundo:mundo@db:5432/mundoinvest
    command: ["./entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mundo
      POSTGRES_PASSWORD: mundo
      POSTGRES_DB: mundoinvest
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundo -d mundoinvest"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mundo
      POSTGRES_PASSWORD: mundo
      POSTGRES_DB: mundoinvest_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundo -d mundoinvest_test"]
      interval: 5s
      timeout: 5s
      retries: 5
